name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Silence deprecation warning

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Removed cache: 'npm' - will re-enable after lockfile is committed

      - name: Install dependencies
        run: npm install  # Changed from 'npm ci' (ci requires lockfile)

      - name: Run unit tests
        run: npm test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Removed cache: 'npm' - will re-enable after lockfile is committed

      - name: Install dependencies
        run: npm install  # Changed from 'npm ci'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=2048'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
